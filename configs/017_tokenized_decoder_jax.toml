[run]
seed = 1337

[data]
dataset_path = "datasets/tinyshakespeare.txt"
tokenizer_path = "artifacts/tokenizers/tinyshakespeare_bpe_512.json"
context_tokens = 64
# text_limit = null

[model]
embedding_dim = 64
num_heads = 4
num_decoder_blocks = 4
hidden_dim = 128

[optimizer]
learning_rate = 0.02

[train]
steps = 50000
batch_size = 16
eval_batch_size = 64
sample_tokens = 100
